<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .container{
            width: 400px;
            margin: 100px auto;
            text-align: center;
            background-color: #f1f1f1;
            padding: 20px;
            border-radius: 10px;
        }
        .joke{
            font-size: 20px;
            margin-bottom: 20px;
        }
        .btn{
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover{
            background-color: #0056b3;
        }
    </style>
    <div class="container">
        <h3>Best jokes to make your day</h3>
        <div class="joke" id="joke">Awesonme Joke is Loading...</div>
        <button id="Jokebtn" class="btn">Get Joke</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
